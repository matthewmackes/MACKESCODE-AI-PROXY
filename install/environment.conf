# MDE LLM-PROXY Environment Configuration
# This file is sourced by systemd services and shell scripts

# Upstream inference endpoint
MATTS_VALUE_SET_BASE_URL="https://inference.do-ai.run"

# Optional bootstrap access key. Prefer MATTS_VALUE_SET_TOKEN_FILE or
# MATTS_VALUE_SET_ACCESS_KEY instead of storing credentials in this file.
EMBEDDED_ACCESS_KEY=""

# Proxy configuration
MATTS_VALUE_SET_PROXY_HOST="127.0.0.1"
MATTS_VALUE_SET_PROXY_PORT="18081"

# Default model
MATTS_VALUE_SET_MODEL="deepseek-3.2"

# Fallback models used only if the active registry cannot be loaded. The
# operator-facing model list comes from config/models.json or
# MATTS_MODEL_CONFIG_FILE.
MATTS_VALUE_SET_MODELS='["deepseek-3.2","deepseek-v4-pro","glm-5","mistral-3-14B","openai-gpt-5.3-codex","stable-diffusion-3.5-large"]'

# Cost tracking files
MATTS_VALUE_SET_COST_FILE="/var/log/matts-value-set/usage.jsonl"
MATTS_VALUE_SET_BUDGET_FILE="/var/lib/matts-value-set/budgets.json"
MATTS_VALUE_SET_LOG_FILE="/var/log/matts-value-set/proxy.jsonl"

# Token file location
MATTS_VALUE_SET_TOKEN_FILE="/var/lib/matts-value-set/.mcnf-do-model-access-token"

# Web console configuration
MATTS_STUDIO_HOST="0.0.0.0"
MATTS_STUDIO_PORT="18181"
MATTS_CONSOLE_AUTH_FILE="/var/lib/matts-value-set/studio/console-auth-token"

# Claude Code routing
ANTHROPIC_BASE_URL="http://127.0.0.1:18081/v1"
ANTHROPIC_API_KEY="matts-value-set-proxy"

# DigitalOcean billing reporting (optional)
# DIGITALOCEAN_TOKEN="your-token-here"
# DIGITALOCEAN_ACCOUNT_URN="do:team:uuid-here"

# Logging level
# LOG_LEVEL="INFO"  # DEBUG, INFO, WARNING, ERROR
