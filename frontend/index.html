<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDE LLM-PROXY Console v2</title>
    <meta name="application-name" content="MDE LLM-PROXY" />
    <meta name="theme-color" content="#0f62fe" />
    <link rel="icon" type="image/png" href="/brand/mde-app-icon.png" />
    <link rel="apple-touch-icon" href="/brand/mde-app-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem("matts-v2-theme");
          var theme = stored === "dark" || stored === "light"
            ? stored
            : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
        } catch (error) {
          /* Theme falls back to light when storage or matchMedia are unavailable. */
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif;
        background: #f4f4f4;
        color: #161616;
      }
      :root[data-theme="dark"] {
        color-scheme: dark;
        background: #161616;
        color: #f4f4f4;
      }
      body {
        margin: 0;
        min-width: 320px;
        background: #f4f4f4;
      }
      :root[data-theme="dark"] body {
        background: #161616;
      }
      .bootShell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        align-content: center;
        justify-items: center;
        padding: 24px;
        background: #161616;
        color: #f4f4f4;
      }
      .bootPanel {
        width: min(760px, 100%);
        display: grid;
        gap: 18px;
        padding: 24px;
        border: 1px solid #525252;
        border-left: 4px solid #0f62fe;
        background: #262626;
      }
      .bootMark {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        background: #0f62fe;
        color: #ffffff;
        font-weight: 700;
        overflow: hidden;
      }
      .bootMark img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .bootPanel span {
        color: #78a9ff;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
      }
      .bootPanel h1 {
        margin: 0;
        max-width: 680px;
        font-size: clamp(36px, 8vw, 72px);
        line-height: .96;
        font-weight: 400;
      }
      .bootPanel p {
        margin: 0;
        max-width: 620px;
        color: #c6c6c6;
        line-height: 1.5;
      }
      .bootActions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .bootActions a {
        min-height: 40px;
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        border: 1px solid #6f6f6f;
        color: #f4f4f4;
        text-decoration: none;
      }
      .bootActions a:first-child {
        border-color: #0f62fe;
        background: #0f62fe;
        color: #ffffff;
      }
      .bootActions a:focus-visible {
        outline: 2px solid #ffffff;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <section class="bootShell" data-testid="v2-boot-fallback" aria-label="MDE LLM-PROXY Console v2 is starting">
        <div class="bootPanel">
          <div class="bootMark" aria-hidden="true">
            <img src="/brand/mde-app-icon.png" alt="" data-testid="boot-brand-icon" />
          </div>
          <div>
            <span>LLM-PROXY Console v2</span>
            <h1>MDE LLM-PROXY is starting</h1>
          </div>
          <p>The React console is loading. If this screen remains visible, refresh the browser session or check the V2 health endpoint.</p>
          <div class="bootActions">
            <a href="">Reload Console</a>
            <a href="/v2/health">V2 Health</a>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
